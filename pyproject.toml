[project]
name = "groundtruth-finances"
version = "4.1.0"
description = "UK personal financial planning engine"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
groundtruth = "main:main"

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific
]
ignore = [
    "E501",   # line length handled by formatter
    "SIM108", # ternary operator — readability preference
    "RUF001", # ambiguous unicode in strings (intentional: ×, £)
    "RUF002", # ambiguous unicode in docstrings (intentional: –, —)
    "B008",   # Depends() in defaults — standard FastAPI pattern
]

[tool.ruff.lint.per-file-ignores]
"tests/test_api.py" = ["E402"]  # import order intentional: env vars must be set before app import
"tests/test_exports.py" = ["E402"]  # same as test_api.py: env vars before app import
"alembic/versions/*.py" = ["UP007", "UP035", "I001", "W291"]  # auto-generated by Alembic

[tool.ruff.lint.isort]
known-first-party = ["engine"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # tighten in v5.1-02

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["engine"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true

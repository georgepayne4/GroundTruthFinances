# category_rules.yaml — Bank Transaction Auto-Categorisation Rules
#
# Maps merchant/description keywords to expense categories used in profile YAML.
# Matching is case-insensitive substring; the first rule whose keyword appears
# in the description wins.
#
# Top-level keys correspond to profile expense categories.
# Sub-keys correspond to monthly expense fields (loader sums any field ending
# in "_monthly" or "_annual"). Sub-key names match those used in
# config/sample_input.yaml so output is profile-compatible.
#
# To extend: add new keywords under an existing category, or add a new
# sub-key (it must end in "_monthly" or "_annual" to be picked up).

